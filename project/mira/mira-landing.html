<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>MIRA — L’IA redessine la carte des compétences. MIRA donne la boussole.</title>
<meta name="description" content="MIRA : le dispositif d’intelligence RH augmentée qui mesure et pilote l’impact de l’IA sur vos ressources humaines." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,300;1,6..72,400;1,6..72,500&family=Hanken+Grotesk:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="theme.css" />
<style>
  /* ---- Variation B: data / technical ---- */
  body.v-b { --bg: #eef0fa; --r: 8px; --r-lg: 12px; --r-xl: 18px; }
  body.v-b .display { font-family: var(--sans); font-weight: 700; letter-spacing: -0.03em; line-height: 1.0; }
  body.v-b .display .italic { font-family: var(--serif); font-weight: 400; }
  body.v-b .kicker { font-weight: 500; }

  /* ---- Variation C: manifesto / ivory ---- */
  body.v-c { --bg: #f4f1ea; --paper: #fbf9f4; --bg-soft: #efe9dd; --line: rgba(40,28,20,.12); --line-soft: rgba(40,28,20,.07); }
  body.v-c .display { font-weight: 400; letter-spacing: -0.02em; }
  body.v-c .grid-tex { background-image: none; }

  .mira-range { -webkit-appearance: none; appearance: none; height: 6px; border-radius: 999px; background: linear-gradient(90deg, var(--violet), var(--violet-300)); outline: none; }
  .mira-range::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 24px; height: 24px; border-radius: 50%; background: #fff; border: 2px solid var(--violet); box-shadow: 0 4px 12px rgba(106,69,255,.4); cursor: pointer; }
  .mira-range::-moz-range-thumb { width: 24px; height: 24px; border-radius: 50%; background: #fff; border: 2px solid var(--violet); cursor: pointer; }
  .nav-link:hover, .nav-login:hover { color: var(--violet) !important; }

  @media (max-width: 1000px) {
    .hero-grid { grid-template-columns: 1fr !important; gap: 48px !important; }
    .lect-grid, .market-grid, .matrix-grid, .calc-grid, .price-grid { grid-template-columns: 1fr !important; }
    .stats-grid, .phases-grid, .diff-grid, .conf-grid, .ticker-grid { grid-template-columns: 1fr 1fr !important; }
    .nav-links { display: none !important; }
    .calc-total { border-left: none !important; padding-left: 0 !important; border-top: 1px solid var(--line); padding-top: 24px; }
  }
  @media (max-width: 640px) {
    .wrap { padding-inline: 20px; }
    .stats-grid, .phases-grid, .diff-grid, .conf-grid, .price-tiers, .ticker-grid { grid-template-columns: 1fr !important; }
    .nav-login { display: none !important; }
    .market-grid, .calc-grid { padding: 32px 24px !important; }
  }
</style>
<template id="__bundler_thumbnail">
  <svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
    <rect width="120" height="120" rx="24" fill="#100a26"/>
    <circle cx="60" cy="60" r="30" fill="none" stroke="#6a45ff" stroke-width="3" opacity="0.5"/>
    <circle cx="60" cy="60" r="7" fill="#6a45ff"/>
    <path d="M60 28 L66 58 L60 60 Z" fill="#ece7fb"/>
    <path d="M60 92 L54 62 L60 60 Z" fill="#6a45ff" opacity="0.6"/>
  </svg>
</template>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/framer-motion@11.18.2/dist/framer-motion.js"></script>
<script src="data.js"></script>
<script type="text/babel" src="charts.jsx"></script>
<script type="text/babel" src="app-a.jsx"></script>
<script type="text/babel" src="app-a2.jsx"></script>
<script type="text/babel" src="var-b.jsx"></script>
<script type="text/babel" src="var-c.jsx"></script>
<script type="text/babel">
  const { motion } = window.Motion;

  /* In-page style switcher (no navigation — swaps the whole composition) */
  function ShareSwitcher({ current, onPick }) {
    const variants = [
      { key: "a", label: "Éditoriale" },
      { key: "b", label: "Données" },
      { key: "c", label: "Manifeste" },
    ];
    return (
      <motion.div
        initial={{ y: 80, opacity: 0 }} animate={{ y: 0, opacity: 1 }} transition={{ delay: 1.2, duration: 0.6, ease: [0.22, 1, 0.36, 1] }}
        style={{ position: "fixed", bottom: 22, left: "50%", transform: "translateX(-50%)", zIndex: 120 }}
      >
        <div style={{
          display: "flex", alignItems: "center", gap: 6, background: "rgba(16,10,38,.9)", backdropFilter: "blur(14px)",
          border: "1px solid rgba(255,255,255,.12)", borderRadius: 999, padding: 6, boxShadow: "0 20px 50px -18px rgba(16,10,38,.7)",
        }}>
          <span style={{ fontFamily: "var(--mono)", fontSize: 10.5, letterSpacing: ".12em", color: "var(--dk-mut)", padding: "0 10px 0 12px", textTransform: "uppercase" }}>Style</span>
          {variants.map((v) => {
            const on = v.key === current;
            return (
              <button key={v.key} onClick={() => onPick(v.key)} style={{
                fontSize: 13, fontWeight: 600, padding: "8px 16px", borderRadius: 999, border: "none",
                background: on ? "var(--violet)" : "transparent", color: on ? "#fff" : "var(--dk-mut)", transition: "all .2s", cursor: "pointer",
              }}>{v.label}</button>
            );
          })}
        </div>
      </motion.div>
    );
  }

  const COMPOSITIONS = {
    a: () => (<React.Fragment><Hero /><Refs /><Stats /><Market /><Methode /><Lectures /><Matrix /><Diff /><Pricing /><Conformite /><FinalCTA /></React.Fragment>),
    b: () => (<React.Fragment><HeroB /><Stats /><Matrix /><Methode /><Lectures /><Refs /><Diff /><Pricing /><Conformite /><FinalCTA /></React.Fragment>),
    c: () => (<React.Fragment><HeroC /><Refs /><Methode /><Stats /><Lectures /><Matrix /><Diff /><Pricing /><Conformite /><FinalCTA /></React.Fragment>),
  };

  function App() {
    const initial = (location.hash.replace("#style=", "").match(/^[abc]$/) ? location.hash.replace("#style=", "") : "a");
    const [variant, setVariant] = React.useState(initial);
    React.useEffect(() => {
      document.body.className = variant === "a" ? "" : "v-" + variant;
      window.scrollTo(0, 0);
    }, [variant]);
    const Body = COMPOSITIONS[variant];
    return (
      <React.Fragment>
        <Nav key={"nav-" + variant} />
        <main key={"main-" + variant}><Body /></main>
        <Footer />
        <ShareSwitcher current={variant} onPick={setVariant} />
      </React.Fragment>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
