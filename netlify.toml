[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  # OPENAI_MODEL est un identifiant de modèle public (ex. « gpt-5.4 »), pas un secret.
  # Il apparaît légitimement dans docs/samples/README.md (provenance des exemples), ce
  # qui faisait échouer le secrets scanning Netlify. On l'exclut du scan ; les vrais
  # secrets (OPENAI_API_KEY, SUPABASE_SERVICE_ROLE_KEY) restent scannés.
  SECRETS_SCAN_OMIT_KEYS = "OPENAI_MODEL"

# Netlify Functions (Tranche 2+) — bundle esbuild, dossier dédié.
[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
  # Le binaire Chromium (@sparticuz/chromium) et puppeteer-core ne doivent pas être
  # inlinés par esbuild : ils embarquent un binaire/des assets résolus au runtime.
  external_node_modules = ["@sparticuz/chromium", "puppeteer-core"]

# Renommage site v2 (13/07) : l'ancienne URL du wizard redirige en 301
# vers la nouvelle. Doit précéder le fallback SPA pour être prioritaire.
[[redirects]]
  from = "/pre-rapport"
  to = "/pre-diagnostic"
  status = 301

# SPA fallback — toutes les routes renvoient vers index.html
# (utile dès que tu ajouteras du routing côté client)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# En-têtes de sécurité appliqués à toutes les réponses
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

# Cache long terme pour les assets fingerprintés par Vite (hash dans le nom)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
