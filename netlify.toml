[build]
  command = "npm run build"
  publish = "dist"

# Netlify Functions (Tranche 2+) — bundle esbuild, dossier dédié.
[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
  # Le binaire Chromium (@sparticuz/chromium) et puppeteer-core ne doivent pas être
  # inlinés par esbuild : ils embarquent un binaire/des assets résolus au runtime.
  external_node_modules = ["@sparticuz/chromium", "puppeteer-core"]

# SPA fallback — toutes les routes renvoient vers index.html
# (utile dès que tu ajouteras du routing côté client)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# En-têtes de sécurité appliqués à toutes les réponses
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

# Cache long terme pour les assets fingerprintés par Vite (hash dans le nom)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
